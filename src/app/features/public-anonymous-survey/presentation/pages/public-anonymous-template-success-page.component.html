<main class="flex min-h-screen flex-col bg-[#F7F9FC] text-xs text-slate-700">
  <section class="mx-auto flex w-full max-w-3xl flex-1 items-center justify-center px-4 py-10">
    <div
      class="w-full rounded-xl border border-emerald-100 bg-white p-5 shadow-sm shadow-slate-200/60"
    >
      <img
        class="mx-auto mb-5 h-auto w-full max-w-sm object-contain"
        src="images/success-animation.gif"
        [attr.alt]="'publicAnonymousTemplates.successTitle' | t"
      />
      <div class="flex items-start gap-3">
        <span
          class="flex h-12 w-12 shrink-0 animate-pulse items-center justify-center rounded-lg bg-emerald-50 text-emerald-700 ring-1 ring-emerald-100"
        >
          <app-icon [icon]="checkIcon" [size]="24" />
        </span>
        <div class="min-w-0">
          <p class="text-[10px] font-extrabold uppercase text-emerald-700">
            {{ 'publicAnonymousTemplates.successEyebrow' | t }}
          </p>
          <h1 class="mt-1 text-lg font-extrabold text-slate-950">
            {{ 'publicAnonymousTemplates.successTitle' | t }}
          </h1>
          <p class="mt-1 text-xs font-semibold leading-5 text-slate-600">
            {{ 'publicAnonymousTemplates.successSubtitle' | t }}
          </p>
        </div>
      </div>
    </div>
  </section>

  <app-public-survey-footer class="mt-auto" />
</main>
